
<style>
  h2.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:var(--font-sans)}
  .wrap{padding:1.5rem 0}
  .phase-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:1.5rem}
  .phase{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:1rem;cursor:pointer;transition:border-color 0.15s}
  .phase:hover{border-color:var(--color-border-secondary)}
  .phase.active{border:1.5px solid #5DCAA5}
  .phase-num{font-size:11px;color:var(--color-text-tertiary);margin-bottom:4px}
  .phase-title{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
  .phase-tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;margin-top:4px}
  .tag-now{background:#E1F5EE;color:#0F6E56}
  .tag-soon{background:#EEEDFE;color:#534AB7}
  .tag-later{background:#F1EFE8;color:#5F5E5A}
  .detail-box{background:var(--color-background-secondary);border-radius:var(--border-radius-lg);padding:1.25rem;margin-bottom:1.5rem;min-height:120px}
  .detail-title{font-size:14px;font-weight:500;color:var(--color-text-primary);margin-bottom:10px}
  .detail-row{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
  .detail-label{font-size:12px;color:var(--color-text-secondary);min-width:90px;padding-top:1px}
  .detail-val{font-size:13px;color:var(--color-text-primary);flex:1}
  .files{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
  .file-chip{font-size:11px;background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:2px 7px;color:var(--color-text-secondary)}
  .legend{display:flex;gap:16px;margin-bottom:1rem}
  .leg-item{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--color-text-secondary)}
  .leg-dot{width:10px;height:10px;border-radius:2px}
</style>
<h2 class="sr-only">Roteiro em 10 fases para montar o portfólio QA. Clique em cada fase para ver detalhes de tarefas, arquivos e critérios de aceite.</h2>
<div class="wrap">
  <div class="legend">
    <div class="leg-item"><div class="leg-dot" style="background:#1D9E75"></div> Fazer agora (dias 1–3)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#7F77DD"></div> Logo depois (dias 4–7)</div>
    <div class="leg-item"><div class="leg-dot" style="background:#888780"></div> Depois (semana 2+)</div>
  </div>
  <div class="phase-grid" id="grid"></div>
  <div class="detail-box" id="detail">
    <div class="detail-title" style="color:var(--color-text-secondary);font-weight:400">Clique em uma fase para ver os detalhes</div>
  </div>
</div>
<script>
const phases=[
  {num:"01",title:"Estrutura do GitHub",tag:"now",tagLabel:"Fazer agora",
   objetivo:"Criar o repositório portfolio-qa-ian-santos com a estrutura de pastas completa",
   tarefas:["Criar repositório público no GitHub","Criar todas as pastas (projetos, templates, evidencias, automacoes)","Adicionar .gitignore e README.md vazio"],
   arquivos:["README.md","projetos/","templates/","evidencias/","automacoes/","contato.md"],
   aceite:"Repositório público acessível, estrutura de pastas visível"},
  {num:"02",title:"README principal",tag:"now",tagLabel:"Fazer agora",
   objetivo:"Criar a apresentação central do portfólio — a primeira coisa que o recrutador vai ler",
   tarefas:["Escrever apresentação honesta como QA Jr","Listar habilidades e ferramentas","Linkar os 4 projetos com badges de status","Adicionar contato"],
   arquivos:["README.md"],
   aceite:"README completo, sem exageros de senioridade, projetos linkados"},
  {num:"03",title:"Detailer App",tag:"now",tagLabel:"Fazer agora",
   objetivo:"Documentar como estudo de caso de QA manual — deixando claro que é prática, não projeto seu",
   tarefas:["Criar README do projeto explicando o contexto","Converter planilha .xlsx em Markdown","Criar casos-de-teste.md, bugs-reportados.md, melhorias.md","Criar relatorio-final.md com métricas"],
   arquivos:["projetos/detailer-app/README.md","plano-de-testes.md","casos-de-teste.md","bugs-reportados.md","melhorias.md","relatorio-final.md"],
   aceite:"Projeto apresentável, deixa claro que é estudo, tem pelo menos 10 casos e 5 bugs documentados"},
  {num:"04",title:"BarberOS",tag:"now",tagLabel:"Fazer agora",
   objetivo:"Case mais forte do portfólio — bugs reais, cliente real, impacto documentado",
   tarefas:["Descrever contexto do cliente (barbearia)","Documentar os 4 bugs reais com severidade e impacto","Criar casos de teste para as funcionalidades principais","Criar plano de regressão","Organizar evidências de bugs"],
   arquivos:["projetos/barber-os/README.md","bugs-reportados.md","casos-de-teste.md","plano-regressao.md","evidencias/"],
   aceite:"4 bugs documentados profissionalmente com severidade, impacto e passos para reproduzir"},
  {num:"05",title:"Klipper",tag:"soon",tagLabel:"Logo depois",
   objetivo:"Projeto de extensão com contexto social e possível aplicação de QA",
   tarefas:["Descrever problema, público e solução","Documentar funcionalidades entregues","Escrever limitações e aprendizados","Sugerir plano de testes futuro"],
   arquivos:["projetos/klipper/README.md","funcionalidades.md","plano-de-testes.md"],
   aceite:"Projeto apresentado com contexto claro, aprendizados honestos e pelo menos um doc de QA"},
  {num:"06",title:"JobPilot",tag:"soon",tagLabel:"Logo depois",
   objetivo:"Projeto autoral com IA — mostrar visão de produto e abordagem de QA em sistema complexo",
   tarefas:["Escrever visão do produto e arquitetura geral","Documentar fluxo principal com IA","Criar plano de testes cobrindo scraping, filtros, geração de currículo e banco","Listar riscos técnicos"],
   arquivos:["projetos/jobpilot/README.md","arquitetura.md","plano-de-testes.md","riscos.md"],
   aceite:"Produto entendível por qualquer QA, plano de testes com pelo menos 5 tipos de teste distintos"},
  {num:"07",title:"Evidências",tag:"soon",tagLabel:"Logo depois",
   objetivo:"Organizar prints e vídeos com padrão de nomenclatura para todos os projetos",
   tarefas:["Criar pastas por projeto dentro de evidencias/","Renomear arquivos com padrão BUG-001, CT-003, VIDEO-001","Referenciar evidências nos documentos Markdown"],
   arquivos:["evidencias/barber-os/","evidencias/detailer-app/","evidencias/klipper/","evidencias/jobpilot/"],
   aceite:"Todas as evidências nomeadas e referenciadas nos documentos com links relativos"},
  {num:"08",title:"Script de automação",tag:"later",tagLabel:"Depois",
   objetivo:"Script Python para converter planilhas .xlsx em Markdown automaticamente",
   tarefas:["Criar automacoes/gerar_docs_qa.py","Ler .xlsx e gerar casos-de-teste.md e bugs-reportados.md","Gerar métricas simples (total, aprovados, bloqueados)","Avisar campos vazios importantes"],
   arquivos:["automacoes/gerar_docs_qa.py","automacoes/requirements.txt","automacoes/README.md"],
   aceite:"Script roda sem erro, gera pelo menos 2 arquivos Markdown com métricas"},
  {num:"09",title:"Testes de API",tag:"later",tagLabel:"Depois",
   objetivo:"Collections Postman/Newman para BarberOS e JobPilot",
   tarefas:["Mapear endpoints principais do BarberOS","Criar collection no Postman com variáveis de ambiente","Exportar collection como JSON para o repositório","Gerar evidência de execução"],
   arquivos:["projetos/barber-os/api/collection.json","projetos/barber-os/api/environment.json","projetos/barber-os/api/README.md"],
   aceite:"Collection executável, pelo menos 5 testes de API documentados com evidência"},
  {num:"10",title:"Playwright",tag:"later",tagLabel:"Depois",
   objetivo:"Automação de testes E2E para BarberOS e JobPilot",
   tarefas:["Instalar e configurar Playwright no projeto","Automatizar fluxo de login","Automatizar fluxo principal (agendamento ou busca de vaga)","Gerar relatório HTML","Configurar GitHub Actions para rodar testes"],
   arquivos:["automacoes/playwright/","automacoes/playwright/tests/","automacoes/playwright/playwright.config.js",".github/workflows/playwright.yml"],
   aceite:"Pelo menos 2 testes E2E rodando e relatório HTML gerado no CI"}
];
const tagStyle={now:"tag-now",soon:"tag-soon",later:"tag-later"};
const grid=document.getElementById("grid");
const detail=document.getElementById("detail");
phases.forEach((p,i)=>{
  const d=document.createElement("div");
  d.className="phase";
  d.innerHTML=`<div class="phase-num">fase ${p.num}</div><div class="phase-title">${p.title}</div><div class="phase-tag ${tagStyle[p.tag]}">${p.tagLabel}</div>`;
  d.onclick=()=>{
    document.querySelectorAll(".phase").forEach(x=>x.classList.remove("active"));
    d.classList.add("active");
    detail.innerHTML=`
      <div class="detail-title">Fase ${p.num} — ${p.title}</div>
      <div class="detail-row"><span class="detail-label">Objetivo</span><span class="detail-val">${p.objetivo}</span></div>
      <div class="detail-row"><span class="detail-label">Tarefas</span><span class="detail-val">${p.tarefas.map(t=>`• ${t}`).join("<br>")}</span></div>
      <div class="detail-row"><span class="detail-label">Arquivos</span><span class="detail-val"><div class="files">${p.arquivos.map(f=>`<span class="file-chip">${f}</span>`).join("")}</div></span></div>
      <div class="detail-row"><span class="detail-label">Critério</span><span class="detail-val">${p.aceite}</span></div>`;
  };
  grid.appendChild(d);
});
</script>
